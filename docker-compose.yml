services:
  backend:
    build: ./backend
    container_name: gym_backend_container
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/code/app
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

